
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <style>
        /* Remove all padding and margin from html and body */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .carousel {
            position: relative;
            box-shadow: 0px 1px 6px rgba(0, 0, 0, 0.64);
            width: 100%;
            height: 100%;
        }

        .carousel-inner {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        .carousel-open:checked + .carousel-item {
            position: static;
            opacity: 1;
        }

        .carousel-item {
            position: absolute;
            opacity: 0;
            transition: opacity 0.6s ease-out;
            width: 100%;
            height: 100%;
        }

        .carousel-item img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carousel-control {
            background: rgba(0, 0, 0, 0.28);
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: none;
            font-size: 40px;
            height: 40px;
            line-height: 35px;
            position: absolute;
            top: 50%;
            transform: translate(0, -50%);
            text-align: center;
            width: 40px;
            z-index: 10;
        }

        .carousel-control.prev {
            left: 2%;
        }

        .carousel-control.next {
            right: 2%;
        }

        .carousel-control:hover {
            background: rgba(0, 0, 0, 0.8);
            color: #aaaaaa;
        }

        #carousel-1:checked ~ .control-1,
        #carousel-2:checked ~ .control-2,
        #carousel-3:checked ~ .control-3 {
            display: block;
        }

        .carousel-indicators {
            list-style: none;
            margin: 0;
            padding: 0;
            position: absolute;
            bottom: 2%;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
        }

        .carousel-indicators li {
            display: inline-block;
            margin: 0 5px;
        }

        .carousel-bullet {
            color: #fff;
            cursor: pointer;
            font-size: 35px;
        }

        .carousel-bullet:hover {
            color: #aaaaaa;
        }

        #carousel-1:checked ~ .control-1 ~ .carousel-indicators li:nth-child(1) .carousel-bullet,
        #carousel-2:checked ~ .control-2 ~ .carousel-indicators li:nth-child(2) .carousel-bullet,
        #carousel-3:checked ~ .control-3 ~ .carousel-indicators li:nth-child(3) .carousel-bullet {
            color: #428bca;
        }

        #title {
            width: 100%;
            position: absolute;
            padding: 0;
            margin: 0 auto;
            text-align: center;
            font-size: 27px;
            color: rgba(255, 255, 255, 1);
            font-family: 'Open Sans', sans-serif;
            z-index: 9999;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.33), -1px 0px 2px rgba(255, 255, 255, 0);
        }
    </style>
</head>
<body>
    <div class="carousel">
        <div class="carousel-inner">
            <!-- Carousel Item 1 -->
            <input class="carousel-open" type="radio" id="carousel-1" name="carousel" hidden checked>
            <div class="carousel-item">
                <img src="1.png" alt="Slide 1">
            </div>

            <!-- Carousel Item 2 -->
            <input class="carousel-open" type="radio" id="carousel-2" name="carousel" hidden>
            <div class="carousel-item">
                <img src="2.png" alt="Slide 2">
            </div>

            <!-- Carousel Item 3 -->
            <input class="carousel-open" type="radio" id="carousel-3" name="carousel" hidden>
            <div class="carousel-item">
                <img src="3.png" alt="Slide 3">
            </div>

            <!-- Controls -->
            <label for="carousel-3" class="carousel-control prev control-1">‹</label>
            <label for="carousel-2" class="carousel-control next control-1">›</label>
            <label for="carousel-1" class="carousel-control prev control-2">‹</label>
            <label for="carousel-3" class="carousel-control next control-2">›</label>
            <label for="carousel-2" class="carousel-control prev control-3">‹</label>
            <label for="carousel-1" class="carousel-control next control-3">›</label>

            <!-- Indicators -->
            <ol class="carousel-indicators">
                <li>
                    <label for="carousel-1" class="carousel-bullet">•</label>
                </li>
                <li>
                    <label for="carousel-2" class="carousel-bullet">•</label>
                </li>
                <li>
                    <label for="carousel-3" class="carousel-bullet">•</label>
                </li>
            </ol>
        </div>
    </div>
</body>
</html>
